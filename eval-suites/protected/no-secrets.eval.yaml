schema_version: "1"
id: protected-no-secrets
role: _protected
description: "Protected: нет секретов, ключей и credentials в коммитах"
tags: [protected, security, secrets]

checks:
  - id: no-api-keys
    summary: Нет API-ключей в диффе
    type: no-match
    target: diff
    pattern: "\\+.*(api[_-]?key|apikey|api[_-]?secret)\\s*[:=]\\s*['\"][^'\"]{8,}"
    severity: error

  - id: no-private-keys
    summary: Нет приватных ключей
    type: no-match
    target: diff
    pattern: "\\+.*-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----"
    severity: error

  - id: no-passwords
    summary: Нет захардкоженных паролей
    type: no-match
    target: diff
    pattern: "\\+.*(password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]{4,}"
    severity: error

  - id: no-tokens
    summary: Нет токенов доступа
    type: no-match
    target: diff
    pattern: "\\+.*(token|bearer|authorization)\\s*[:=]\\s*['\"][A-Za-z0-9+/=_-]{20,}"
    severity: error

  - id: no-env-files
    summary: Нет .env файлов в коммите
    type: command
    command: "git diff --name-only HEAD~1 | grep -E '^\\.env' | wc -l | awk '{if ($1 > 0) exit 1}'"
    severity: error

  - id: no-aws-credentials
    summary: Нет AWS credentials
    type: no-match
    target: diff
    pattern: "\\+.*(AKIA[0-9A-Z]{16}|aws_secret_access_key)"
    severity: error
